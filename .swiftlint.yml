included:
  - Sources
  - Tests

opt_in_rules:
  - array_init
  - closure_spacing
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - first_where
  - last_where
  - redundant_nil_coalescing
  - toggle_bool
  - yoda_condition

disabled_rules:
  - trailing_whitespace  # swiftformat handles this
  - trailing_comma       # swiftformat owns this (adds trailing commas)
  - opening_brace        # swiftformat owns brace placement
  - force_cast
  - file_length          # test files grow linearly with coverage; not a useful signal
  - type_body_length     # test classes grow linearly with coverage; not a useful signal

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 60   # raised from default 50; switch-heavy dispatch functions
  error: 100

cyclomatic_complexity:
  warning: 12   # raised from default 10; tryMatch in RuleEngine has 11 branches

reporter: "xcode"
