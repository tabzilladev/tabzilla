version: 1

defaults:
  browser: com.google.Chrome
  window: Default

rules:
  # Test 1: Basic URL pattern matching
  - name: basic-url-match
    url: example\.com/test/basic
    window: TestWindow1

  # Test 2: URL with capture groups + useTab
  - name: doc-reuse
    url: example\.com/doc/([a-z0-9]+)
    useTab: example\.com/doc/\1
    window: Docs

  # Test 3: focusTab (no navigation)
  - name: focus-only
    url: example\.com/focus/([a-z0-9]+)
    focusTab: example\.com/focus/\1
    window: Focus

  # Test 4: Different browser
  - name: alt-browser
    url: example\.com/test/altbrowser
    browser: com.google.Chrome.beta
    window: BetaWindow

  # Test 5: Case insensitive URL match
  - name: case-insensitive
    url: (?i)example\.com/TEST/CASE
    window: CaseTest

  # Catch-all
  - url: .*

logging:
  enabled: true
  path: ~/Library/Logs/Tabzilla/tabz.log
