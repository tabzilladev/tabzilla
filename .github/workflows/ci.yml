name: CI

on:
  # Manual-trigger only during v0 rapid iteration to avoid burning CI minutes.
  # push/pull_request triggers will be added once the project stabilizes.
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Run unit tests
        run: make test

      - name: Verify release build
        run: make build
