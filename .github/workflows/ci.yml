name: CI

on:
  # Run on PRs targeting main so checks gate merges, plus manual dispatch.
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install lint/format tools
        env:
          HOMEBREW_REQUIRE_TAP_TRUST: "1"
        run: |
          # Trust the runner's preinstalled third-party taps so the trust check
          # loads them silently instead of warning.
          brew trust --tap aws/tap azure/bicep || true
          brew install swiftlint swiftformat

      - name: Run linters
        run: make lint

      - name: Verify formatting
        run: make format-check

      - name: Run unit tests
        run: make test

      - name: Verify release build
        run: make build
